# Place this directive inside nginx's http block (for example in /etc/nginx/conf.d/).
limit_req_zone $binary_remote_addr zone=xszn_comment_api:10m rate=300r/m;

# Place this location inside both xszn-ny.cn HTTPS server blocks.
location /api/ {
    client_max_body_size 8k;
    limit_req zone=xszn_comment_api burst=100 nodelay;

    proxy_pass http://127.0.0.1:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 3s;
    proxy_send_timeout 8s;
    proxy_read_timeout 8s;
}
